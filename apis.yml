aid: wireshark
name: Wireshark
description: >-
  Wireshark is the world's foremost and widely-used free and open-source network
  protocol analyzer. It is used for network troubleshooting, analysis, software
  and communications protocol development, and education. It lets you capture
  and interactively browse the traffic running on a computer network.
