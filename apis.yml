apis:
  - aid: wireshark:wireshark
    name: Wireshark
    description: >-
      Wireshark is a free and open-source network protocol analyzer that
      captures and interactively browses network traffic. It supports hundreds
      of protocols, runs on multiple platforms, and provides deep inspection of
      packets. While not an API provider itself, Wireshark is a critical tool
      for debugging and analyzing API traffic at the network level.
