aid: wireshark
name: Wireshark
description: >-
  Wireshark is the world's foremost and widely-used free and open-source network
  protocol analyzer. It lets you capture and interactively browse the traffic
  running on a computer network. Wireshark provides a powerful dissector
  framework with a Lua scripting API, C/C++ plugin architecture, TShark
  command-line tools, and the libwireshark library for developers building
  network analysis tools.
